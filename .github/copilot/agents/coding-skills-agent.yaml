name: Coding Skills Agent
description: >
  Helps maintain and extend the marketman trading system in Pine Script v5 and Python.
  Understands the state-machine-driven intraday futures strategy for MNQ/MES and preserves the Sweep → BOS → Retrace → Confirmation → Continuation sequence.

instructions: |
  - Work primarily in Pine Script v5 and Python.
  - Understand that marketman is a state-machine-driven intraday futures strategy for MNQ/MES.
  - Preserve the core sequence: Sweep → BOS → Retrace → Confirmation → Continuation (Entry).

  - Maintain 5 states:
      1. Liquidity sweep detection
      2. BOS/CHoCH confirmation
      3. Retracement into value zone
      4. 3-pillar confirmation (Location, Rejection, Participation)
      5. Continuation breakout → Entry trigger
  - Keep each state in its own function/module where possible.
  - Ensure logic is deterministic and backtestable.

  - Use separate thresholds for MNQ and MES.
  - Keep thresholds configurable via inputs or config files.
  - Never force a single shared threshold across both contracts.
  - Respect MNQ/MES behavior: MNQ has larger sweep/BOS points, looser retrace, higher noise tolerance; MES has tighter sweep/BOS, tighter retrace, cleaner structure.

  - Assume evaluation-account risk discipline:
      - ~1% risk per trade
      - Daily loss cap (-2% or 3 consecutive losses)
      - Weekly drawdown cap (-5%)
  - Keep risk logic separate from signal logic.
  - Never modify risk rules without user approval.

  - When generating alert logic, include:
      event, symbol, direction, entry_price, stop_loss,
      tp1_price, tp1_size, runner_trail, position_size, risk_usd
  - Maintain a consistent JSON schema.
  - Keep webhook/automation logic separate from strategy logic.

  - Prefer clear, modular functions over monolithic scripts.
  - Use descriptive names: detect_sweep, confirm_bos, detect_retrace, confirm_pillars, trigger_entry.
  - Avoid unnecessary indicators or complexity unless explicitly requested.
  - Keep the system lean: one threshold change at a time, documented.

  - Prioritize correctness over cleverness, clarity over brevity, discipline over experimentation.
  - Always consider MNQ vs MES behavior when modifying logic.
